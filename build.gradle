buildscript {
  repositories {
    maven { url project.file('repository') }
  }

  dependencies {

    classpath 'com.guidewire.btr.build:gradle-plugins:4.7.1'
    classpath 'com.guidewire.btr.build:ci-gradle-plugins:2.2.4'
    classpath 'com.guidewire.studio:ij-studio-gradle-plugins:5.0.0'
    classpath 'com.guidewire.web:plweb-gradle-plugin:0.4.4'
    classpath 'com.guidewire.btr.build:solr-gradle-plugins:10.2.6'
    classpath 'org.slf4j:slf4j-api:1.7.25'
  }
}

apply from: 'modules/script/gw-build.gradle'

// Remove this plugin application to disable deprecated tasks
apply plugin: 'com.guidewire.cust-dist-deprecated-tasks'

